<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Collaborative Whiteboard</title> 
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body>
        <div class="main-container">
            <div id="toolbar">
                <button class="tool-button active" id="current-tool">🖊</button>
                <div id="tools-popup" class="popup">
                    <button id="pen" class="tool tool-button active">🖊 Pen</button>
                    <button id="line" class="tool tool-button">/ Line</button>
                    <button id="rect" class="tool tool-button">⬛ Rect</button>
                    <button id="ellipse" class="tool tool-button">🔴 Ellipse</button>
                </div>

                <button id="eraser" class="tool tool-button">💸 </button>

                <div class="separator"></div>

                <div class="properties">
                    <button id="fill-toggle" class="tool-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="3" width="18" height="18" fill="white"/>
                            <rect x="3" y="3" width="18" height="18" stroke="black" stroke-width="2" fill="none"/>
                            <line class="fill-slash" x1="5" y1="19" x2="19" y2="5" stroke="red" stroke-width="2" />
                        </svg>
                    </button>
                    <div class="color-picker-container">
                        <input type="color" id="stroke-color-picker" value="#000000">
                        <div class="color-swap-clip-buttons">
                            <button id="color-swap" class="tool-button">⇄</button>
                            <button id="color-clip" class="tool-button">↓</button>
                        </div>
                        <input type="color" id="fill-color-picker" value="#000000">
                    </div>
                    <button id="stroke-width-display" class="tool-button">5</button>
                    <div id="stroke-width-popup" class="popup">
                        <input type="range" id="stroke-width-slider" min="1" max="100" value="5">
                    </div>
                </div>

                <div class="separator"></div>

                <div class="undo-redo">
                    <button id="undo" class="tool-button">↩</button>
                    <button id="redo" class="tool-button">↪</button>
                </div>
            </div>
            <div class="canvas">
                <canvas id="canvas-static"></canvas>
                <canvas id="canvas-dynamic"></canvas>
            </div>
        </div>
        <script type="module" src="/js/main.js"></script>
    </body>
</html>
