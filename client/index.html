<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Collaborative Whiteboard</title> 
        <script src="/socket.io/socket.io.js"></script>
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body>
        <div id="landing-page">
            <div id="landing-card">
                <h1>Whiteboard</h1>
                <p>Create a room or join an existing one</p>

                <div class="input-group">
                <label>Room Code</label>
                <input type="text" id="room-code-input" placeholder="e.g. myroom123" />
                </div>

                <div class="input-group">
                <label>Password <span>(optional)</span></label>
                <input type="password" id="room-password-input" placeholder="leave empty for no password" />
                </div>

                <div id="landing-error"></div>

                <div class="landing-buttons">
                <button id="create-room-btn">Create Room</button>
                <button id="join-room-btn">Join Room</button>
                </div>
            </div>
        </div>
        <div id="whiteboard" class="hidden main-container">
            <div id="toast"></div>
            <button id="leave-room-btn">X</button>
            <button id="toolbar-toggle">(</button>
            <div id="toolbar">
                <button class="tool-button active" id="current-tool">🖊</button>
                <div id="tools-popup" class="popup">
                    <button id="pen" class="tool tool-button active" title='Pen - P'>🖊 Pen</button>
                    <button id="line" class="tool tool-button" title="Line - L">/ Line</button>
                    <button id="rect" class="tool tool-button" title="Rectangle - R">⬜ Rect</button>
                    <button id="ellipse" class="tool tool-button" title="Ellipse - O">⚪ Ellipse</button>
                </div>

                <button id="eraser" class="tool tool-button" title="Eraser - E">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eraser" viewBox="0 0 16 16">
                        <path d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828zm2.121.707a1 1 0 0 0-1.414 0L4.16 7.547l5.293 5.293 4.633-4.633a1 1 0 0 0 0-1.414zM8.746 13.547 3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293z"/>
                    </svg>
                </button>

                <div class="separator"></div>

                <div class="properties">
                    <button id="fill-toggle" class="tool-button" >
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="3" width="18" height="18" fill="white"/>
                            <rect x="3" y="3" width="18" height="18" stroke="black" stroke-width="2" fill="none"/>
                            <line class="fill-slash" x1="5" y1="19" x2="19" y2="5" stroke="red" stroke-width="2" />
                        </svg>
                    </button>
                    <div class="color-picker-container">
                        <input type="color" id="stroke-color-picker" value="#000000">
                        <div class="color-swap-clip-buttons">
                            <button id="color-swap" class="tool-button" title="Swap Colors - X">⇄</button>
                            <button id="color-clip" class="tool-button">    
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <rect x="3" y="8" width="18" height="8" rx="4" stroke="white" stroke-width="2"/>
                                    <path d="M10 12h4" stroke="white" stroke-width="2" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                        <input type="color" id="fill-color-picker" class="" value="#000000">
                    </div>
                    <button id="stroke-width-display" class="tool-button" title="Stroke Width - []">5</button>
                    <div id="stroke-width-popup" class="popup">
                        <input type="range" id="stroke-width-slider" min="1" max="100" value="5">
                    </div>
                </div>

                <div class="separator"></div>

                <div class="undo-redo">
                    <button id="undo" class="tool-button" title="Undo - Ctrl+Z">↩</button>
                    <button id="redo" class="tool-button" title="Redo - Ctrl+Y">↪</button>
                </div>

                <div class="separator"></div>

                <button id="save" class="tool-button" title="Save file - Ctrl+S">💾</button>
                <button id="load" class="tool-button">📂</button>
            </div>
            <div id="zoom-control">
                <button id="zoom-out">−</button>
                <input type="range" id="zoom-slider" min="1" max="150" value="82">
                <button id="zoom-in">+</button>
                <span id="zoom-display">82%</span>
            </div>
            <div class="canvas">
                <canvas id="canvas-static"></canvas>
                <canvas id="canvas-dynamic"></canvas>
            </div>
        </div>
        <script type="module" src="/js/main.js"></script>
    </body>
</html>
